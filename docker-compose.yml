name: glm52-v17-lmcache-ckv-gather

services:
  glm52:
    image: ${GLM52_IMAGE:-glm52-v17-lmcache-ckv-gather:0.1.0-exp.1}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:-0.1.0-exp.1}
    container_name: glm52-v17-lmcache-ckv-gather
    restart: "no"
    network_mode: host
    ipc: host
    shm_size: 32g
    init: true
    mem_limit: ${CONTAINER_MEMORY_LIMIT:-110g}
    gpus: all
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 1048576
        hard: 1048576
      stack: 67108864
    volumes:
      - type: bind
        source: ${MODEL_PATH:?Set MODEL_PATH in .env}
        target: /model
        read_only: true
      - type: bind
        source: ${HF_CACHE_PATH:?Set HF_CACHE_PATH in .env}
        target: /root/.cache/huggingface
      - type: bind
        source: ${RUNTIME_CACHE_PATH:?Set RUNTIME_CACHE_PATH in .env}
        target: /cache
      - type: bind
        source: ${RUNTIME_TMP_PATH:?Set RUNTIME_TMP_PATH in .env}
        target: /container-tmp
    environment:
      GPUS: 0,1,2,3
      PORT: ${PORT:-5001}
      TP: "4"
      DCP: "4"
      DCP_BACKEND: a2a
      DCP_A2A_MAX_TOKENS: "16"
      DCP_A2A_LARGE_BACKEND: ag_rs
      DCP_PREFILL_WORKSPACE: auto
      VLLM_B12X_MLA_CKV_GATHER: "1"
      VLLM_B12X_MLA_CKV_GATHER_MIN_TOKENS: "16"
      VLLM_B12X_MLA_CKV_GATHER_MAX_TOKENS: "262144"
      MTP: "3"
      MAX_NUM_SEQS: "8"
      GRAPH: "64"
      ENFORCE_EAGER: "0"
      MAX_MODEL_LEN: "262144"
      MAX_BATCHED_TOKENS: "3072"
      GPU_MEMORY_UTILIZATION: "0.968"
      KV_CACHE_MEMORY_BYTES: "4563402752"
      MODEL: /model
      MODEL_REVISION: ""
      SERVED_MODEL_NAME: GLM-5.2
      MOE_MODE: a16
      ONLINE_QUANT: mxfp8
      KV_CACHE_DTYPE: nvfp4_ds_mla
      LOAD_FORMAT: instanttensor
      INSTANTTENSOR_BACKEND: BUFFERED
      LMCACHE_CHUNK_SIZE: "512"
      LMCACHE_L1_GB: ${LMCACHE_L1_GB:-48}
      LMCACHE_L1_INIT_GB: ${LMCACHE_L1_GB:-48}
      LMCACHE_PORT: "5555"
      LMCACHE_HTTP_PORT: ${LMCACHE_HTTP_PORT:-8088}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://127.0.0.1:${PORT:-5001}/v1/models >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1200s

